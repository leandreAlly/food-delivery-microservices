# =============================================================
# Food Delivery Platform — full stack
# `docker compose up --build` brings everything online.
#
# Boot order is enforced by healthchecks + depends_on conditions:
#   databases / Redis / RabbitMQ  →  eureka-server  →  4 services  →  api-gateway
# =============================================================

services:

  # =================================================
  # Databases — one Postgres per service
  # Host ports remapped to 5433-5436 so they don't
  # collide with each other (or a host Postgres on 5432).
  # =================================================

  customer-db:
    image: postgres:16-alpine
    container_name: customer-db
    environment:
      POSTGRES_DB: customer_db
      POSTGRES_USER: customer
      POSTGRES_PASSWORD: customer
    ports:
      - "5433:5432"
    volumes:
      - customer-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U customer -d customer_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - food-delivery-net

  restaurant-db:
    image: postgres:16-alpine
    container_name: restaurant-db
    environment:
      POSTGRES_DB: restaurant_db
      POSTGRES_USER: restaurant
      POSTGRES_PASSWORD: restaurant
    ports:
      - "5434:5432"
    volumes:
      - restaurant-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U restaurant -d restaurant_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - food-delivery-net

  order-db:
    image: postgres:16-alpine
    container_name: order-db
    environment:
      POSTGRES_DB: order_db
      POSTGRES_USER: order
      POSTGRES_PASSWORD: order
    ports:
      - "5435:5432"
    volumes:
      - order-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U order -d order_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - food-delivery-net

  delivery-db:
    image: postgres:16-alpine
    container_name: delivery-db
    environment:
      POSTGRES_DB: delivery_db
      POSTGRES_USER: delivery
      POSTGRES_PASSWORD: delivery
    ports:
      - "5436:5432"
    volumes:
      - delivery-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U delivery -d delivery_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - food-delivery-net

  # =================================================
  # Message broker + cache
  # =================================================

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    environment:
      # Dedicated user — the default 'guest' is locked to loopback by
      # RabbitMQ, which rejects connections from other containers.
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-fooddelivery}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-fooddelivery}
    ports:
      - "5672:5672"     # AMQP
      - "15672:15672"   # management UI
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - food-delivery-net

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - food-delivery-net

  # =================================================
  # Service discovery
  # =================================================

  eureka-server:
    build:
      context: .
      dockerfile: infrastructure/eureka-server/Dockerfile
    container_name: eureka-server
    environment:
      SPRING_PROFILES_ACTIVE: docker
    ports:
      - "8761:8761"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s
    networks:
      - food-delivery-net

  # =================================================
  # Business services
  # =================================================

  customer-service:
    build:
      context: .
      dockerfile: services/customer-service/Dockerfile
    container_name: customer-service
    environment:
      SPRING_PROFILES_ACTIVE: docker
      EUREKA_URL: http://eureka-server:8761/eureka/
      DB_URL: jdbc:postgresql://customer-db:5432/customer_db
      DB_USERNAME: customer
      DB_PASSWORD: customer
      JWT_SECRET: ${JWT_SECRET:-dev-only-jwt-secret-do-not-use-in-production-min-256-bits-required}
    ports:
      - "8081:8081"
    depends_on:
      customer-db:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s
    networks:
      - food-delivery-net

  restaurant-service:
    build:
      context: .
      dockerfile: services/restaurant-service/Dockerfile
    container_name: restaurant-service
    environment:
      SPRING_PROFILES_ACTIVE: docker
      EUREKA_URL: http://eureka-server:8761/eureka/
      DB_URL: jdbc:postgresql://restaurant-db:5432/restaurant_db
      DB_USERNAME: restaurant
      DB_PASSWORD: restaurant
      JWT_SECRET: ${JWT_SECRET:-dev-only-jwt-secret-do-not-use-in-production-min-256-bits-required}
    ports:
      - "8082:8082"
    depends_on:
      restaurant-db:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      customer-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s
    networks:
      - food-delivery-net

  order-service:
    build:
      context: .
      dockerfile: services/order-service/Dockerfile
    container_name: order-service
    environment:
      SPRING_PROFILES_ACTIVE: docker
      EUREKA_URL: http://eureka-server:8761/eureka/
      DB_URL: jdbc:postgresql://order-db:5432/order_db
      DB_USERNAME: order
      DB_PASSWORD: order
      JWT_SECRET: ${JWT_SECRET:-dev-only-jwt-secret-do-not-use-in-production-min-256-bits-required}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: ${RABBITMQ_USER:-fooddelivery}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-fooddelivery}
    ports:
      - "8083:8083"
    depends_on:
      order-db:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      customer-service:
        condition: service_healthy
      restaurant-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s
    networks:
      - food-delivery-net

  delivery-service:
    build:
      context: .
      dockerfile: services/delivery-service/Dockerfile
    container_name: delivery-service
    environment:
      SPRING_PROFILES_ACTIVE: docker
      EUREKA_URL: http://eureka-server:8761/eureka/
      DB_URL: jdbc:postgresql://delivery-db:5432/delivery_db
      DB_USERNAME: delivery
      DB_PASSWORD: delivery
      JWT_SECRET: ${JWT_SECRET:-dev-only-jwt-secret-do-not-use-in-production-min-256-bits-required}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: ${RABBITMQ_USER:-fooddelivery}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-fooddelivery}
    ports:
      - "8084:8084"
    depends_on:
      delivery-db:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      order-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8084/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s
    networks:
      - food-delivery-net

  # =================================================
  # API Gateway — the single entry point (port 8080)
  # =================================================

  api-gateway:
    build:
      context: .
      dockerfile: infrastructure/api-gateway/Dockerfile
    container_name: api-gateway
    environment:
      SPRING_PROFILES_ACTIVE: docker
      EUREKA_URL: http://eureka-server:8761/eureka/
      REDIS_HOST: redis
      JWT_SECRET: ${JWT_SECRET:-dev-only-jwt-secret-do-not-use-in-production-min-256-bits-required}
    ports:
      - "8080:8080"
    depends_on:
      redis:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      customer-service:
        condition: service_healthy
      restaurant-service:
        condition: service_healthy
      order-service:
        condition: service_healthy
      delivery-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s
    networks:
      - food-delivery-net

volumes:
  customer-db-data:
  restaurant-db-data:
  order-db-data:
  delivery-db-data:
  rabbitmq-data:

networks:
  food-delivery-net:
    driver: bridge
    name: food-delivery-net
