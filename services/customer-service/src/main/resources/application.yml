# =============================================================
# Customer Service — local dev profile (H2 in-memory)
# Production / Docker config lives in application-docker.yml
# =============================================================

server:
  port: 8081

spring:
  application:
    name: customer-service

  datasource:
    url: jdbc:h2:mem:customer_db;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.H2Dialect

# --- JWT (HS256). Secret comes from env in production / Docker. ---
app:
  jwt:
    secret: ${JWT_SECRET:dev-only-jwt-secret-do-not-use-in-production-min-256-bits-required}
    expiration-ms: 86400000  # 24h

# --- Eureka client ---
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true

# --- Actuator ---
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when_authorized
