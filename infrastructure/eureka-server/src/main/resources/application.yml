# =============================================================
# Eureka Server — service registry for the platform
# =============================================================

server:
  port: 8761

spring:
  application:
    name: eureka-server

eureka:
  instance:
    hostname: localhost
  client:
    # The Eureka server does not register with another Eureka and
    # does not fetch a registry — it IS the registry.
    register-with-eureka: false
    fetch-registry: false
    service-url:
      defaultZone: http://${eureka.instance.hostname}:${server.port}/eureka/

  server:
    # Disable self-preservation in dev — it keeps stale instances in the
    # registry during network blips, which is the right call in prod
    # (avoids mass-eviction storms) but causes confusion locally when
    # you stop a service and it lingers as UP.
    enable-self-preservation: false
    eviction-interval-timer-in-ms: 5000

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    com.netflix.eureka: INFO
    com.netflix.discovery: INFO
