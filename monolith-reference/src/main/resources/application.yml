# =============================================================
# Food Delivery Platform Monolith — Application Configuration
# =============================================================
# NOTE: This monolith uses a SINGLE database for all domains.
# When refactoring into microservices, each service should
# have its own database (database-per-service pattern).
# =============================================================

server:
  port: 8080

spring:
  application:
    name: food-delivery-monolith

  # --- Single shared database (monolith anti-pattern) ---
  datasource:
    url: jdbc:h2:mem:fooddelivery
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.H2Dialect

# --- JWT Configuration ---
app:
  jwt:
    secret: myMonolithSecretKeyThatShouldBeExternalizedInMicroservices2024FoodDelivery!
    expiration-ms: 86400000  # 24 hours

# --- Actuator ---
management:
  endpoints:
    web:
      exposure:
        include: health,info
